<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Future: converse com IA real poderosa. Design futurista dark/neon. Pergunte qualquer coisa!">
  <title>Future — IA Inteligente</title>
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <div class="logo-container">
      <svg width="48" height="48" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo">
        <circle cx="100" cy="100" r="90" stroke="var(--accent)" stroke-width="12" stroke-dasharray="20 15"/>
        <circle cx="100" cy="100" r="55" fill="var(--accent)" opacity="0.25"/>
        <path d="M70 100 L90 130 L130 70 L150 100" stroke="var(--accent)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="100" cy="100" r="8" fill="white"/>
      </svg>
      <h1>Future</h1>
    </div>
    <p class="subtitle">converse com uma IA que pensa no futuro</p>
  </header>

  <main class="chat-container">
    <div id="chat-messages" class="messages"></div>
    
    <div class="input-area">
      <textarea id="user-input" placeholder="Digite sua mensagem... (pressione Shift + Enter para nova linha)" rows="1"></textarea>
      <button id="send-btn">Enviar →</button>
    </div>
  </main>

  <footer>
    <p>Feito com ❤️ por você | Powered by GitHub Pages • 2026</p>
  </footer>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
